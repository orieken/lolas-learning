name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @lolas/core-sdk build
          pnpm --filter @lolas/ui-kit build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests (Vitest + Coverage)
        run: pnpm test -- --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

      - name: Build shell
        run: pnpm --filter @lolas/shell build

      - name: Upload shell dist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shell-dist
          path: apps/shell/dist
          if-no-files-found: warn

      - name: Netlify Deploy (Production)
        if: github.ref == 'refs/heads/main' && !github.event.pull_request
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
            mkdir -p .netlify
            echo "{\"siteId\": \"$NETLIFY_SITE_ID\"}" > .netlify/state.json
            npx netlify-cli deploy --dir=apps/shell/dist --prod --message "main build ${GITHUB_SHA}";
          else
            echo "Netlify secrets missing; skipping deploy";
          fi

      - name: Netlify Deploy (Preview)
        if: github.event_name == 'pull_request'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
            mkdir -p .netlify
            echo "{\"siteId\": \"$NETLIFY_SITE_ID\"}" > .netlify/state.json
            npx netlify-cli deploy --dir=apps/shell/dist --message "pr preview ${GITHUB_HEAD_REF}";
          else
            echo "Netlify secrets missing; skipping preview deploy";
          fi
